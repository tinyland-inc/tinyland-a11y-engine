name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  packages: read
jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@61cd1338ca9dae8a25985c0a36ff7beb111449be
    with:
      runner_mode: repo_owned
      runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      workspace_mode: isolated
      publish_mode: hosted_exception
      node_versions: '["22"]'
      publish_node_version: "22"
      pnpm_version: "10.13.1"
      # npm-resolution validation retired — first-party deps resolve via the
      # Bazel module graph (TIN-1716). Validate via bazel_targets only.
      # typecheck/unit_test skip on empty; build/package_check default to pnpm
      # via `|| `, so no-op them with `true`. The package artifact comes from
      # bazel-bin/pkg, not the pnpm dist. Clean fleet form = a ci-templates
      # `bazel_first` mode (follow-up).
      typecheck_command: ""
      unit_test_command: ""
      build_command: "true"
      package_check_command: "true"
      bazel_targets: "//:pkg //:test"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      npm_publish_mode: disabled
      github_package_name: "@tinyland-inc/tinyland-a11y-engine"
      dry_run: true
    secrets: inherit
